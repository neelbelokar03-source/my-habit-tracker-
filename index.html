<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neel CET Tracker 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; color: white;
            overflow-x: hidden;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header { 
            text-align: center; 
            background: rgba(255,255,255,0.1); 
            padding: 30px; 
            border-radius: 25px; 
            backdrop-filter: blur(20px);
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .header h1 { 
            font-size: 3em; 
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        .quote { 
            font-size: 1.3em; 
            font-weight: 600; 
            opacity: 0.9;
            animation: fadeIn 2s ease-in;
        }
        
        /* Stats */
        .stats { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .stat-card { 
            background: rgba(255,255,255,0.15); 
            padding: 20px 30px; 
            border-radius: 20px; 
            text-align: center;
            min-width: 120px;
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-10px); }
        .stat-number { font-size: 2.5em; font-weight: 700; display: block; }
        
        /* Grid */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 25px; 
            margin-bottom: 30px;
        }
        
        /* Cards */
        .card { 
            background: rgba(255,255,255,0.12); 
            border-radius: 25px; 
            padding: 30px; 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .card h2 { 
            display: flex; align-items: center; gap: 10px; 
            margin-bottom: 20px; font-size: 1.4em; 
        }
        
        /* Timer */
        .timer-display { 
            font-size: 4em; font-weight: 700; 
            text-align: center; margin: 20px 0;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .timer-controls { text-align: center; }
        button { 
            background: linear-gradient(45deg, #ff6b6b, #feca57); 
            color: white; border: none; 
            padding: 15px 30px; border-radius: 50px; 
            cursor: pointer; font-size: 1.1em; 
            font-weight: 600; margin: 5px; 
            transition: all 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Habits */
        .habit-item { 
            display: flex; align-items: center; 
            padding: 15px; margin: 10px 0; 
            background: rgba(255,255,255,0.1); 
            border-radius: 15px; cursor: pointer;
            transition: all 0.3s;
        }
        .habit-item:hover { background: rgba(255,255,255,0.2); }
        .habit-item.completed { 
            background: linear-gradient(45deg, #48dbfb, #00d2d3); 
            text-decoration: line-through;
        }
        .habit-checkbox { 
            width: 25px; height: 25px; 
            margin-right: 15px; cursor: pointer;
            accent-color: #48dbfb;
        }
        
        /* Reminders */
        .reminder-input { 
            width: 100%; padding: 15px; 
            border: none; border-radius: 15px; 
            margin-bottom: 15px; font-size: 1.1em;
            background: rgba(255,255,255,0.9);
        }
        .reminder-item { 
            display: flex; justify-content: space-between; 
            align-items: center; padding: 12px; 
            background: rgba(255,255,255,0.1); 
            margin: 8px 0; border-radius: 12px;
            cursor: pointer;
        }
        .reminder-item:hover { background: rgba(255,255,255,0.2); }
        .delete-btn { 
            background: #ff6b6b; padding: 5px 10px; 
            border-radius: 10px; font-size: 0.9em;
        }
        
        /* Notes */
        .notes-area { 
            width: 100%; min-height: 120px; 
            padding: 15px; border-radius: 15px; 
            border: none; resize: vertical;
            background: rgba(255,255,255,0.9);
            font-family: inherit; font-size: 1.1em;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        
        @media (max-width: 768px) { 
            .header h1 { font-size: 2em; }
            .timer-display { font-size: 2.5em; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header fade-in">
            <h1><i class="fas fa-crown"></i> Neel CET Domination</h1>
            <div class="quote" id="dailyQuote"></div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <span class="stat-number" id="streak">0</span>
                <span>Day Streak</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="todayScore">0</span>
                <span>Today's Score</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="totalDays">0</span>
                <span>Total Days</span>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="dashboard-grid">
            <!-- Habits Tracker -->
            <div class="card fade-in">
                <h2><i class="fas fa-check-square"></i> CET Study Blocks</h2>
                <div class="habit-item" onclick="toggleHabit('morningBlock')">
                    <input type="checkbox" id="morningBlock" class="habit-checkbox">
                    <span>5:30-8:15 Physics (40 MCQs)</span>
                </div>
                <div class="habit-item" onclick="toggleHabit('mathBlock')">
                    <input type="checkbox" id="mathBlock" class="habit-checkbox">
                    <span>3:30-5:00 Math Deep Dive</span>
                </div>
                <div class="habit-item" onclick="toggleHabit('chemBlock')">
                    <input type="checkbox" id="chemBlock" class="habit-checkbox">
                    <span>5:15-8:30 Chem + MCQs</span>
                </div>
                <div class="habit-item" onclick="toggleHabit('nightBlock')">
                    <input type="checkbox" id="nightBlock" class="habit-checkbox">
                    <span>9:00-9:45 AI Questions</span>
                </div>
                <button onclick="saveAll()" style="width: 100%; margin-top: 20px;">
                    <i class="fas fa-save"></i> Save & Update Streak
                </button>
            </div>

            <!-- Study Timer -->
            <div class="card fade-in">
                <h2><i class="fas fa-clock"></i> Pomodoro Timer</h2>
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-controls">
                    <button onclick="startPomodoro()"><i class="fas fa-play"></i> Start 25m</button>
                    <button onclick="pauseTimer()" id="pauseBtn" disabled><i class="fas fa-pause"></i> Pause</button>
                    <button onclick="resetTimer()"><i class="fas fa-redo"></i> Reset</button>
                </div>
                <p style="text-align: center; margin-top: 15px; opacity: 0.8;">Next: Physics Block</p>
            </div>

            <!-- Reminders -->
            <div class="card fade-in">
                <h2><i class="fas fa-bell"></i> Today's Targets</h2>
                <input type="text" class="reminder-input" id="newReminder" placeholder="e.g. 40 Physics MCQs...">
                <button onclick="addReminder()" style="width: 100%;"><i class="fas fa-plus"></i> Add Target</button>
                <div id="remindersList" style="max-height: 200px; overflow-y: auto; margin-top: 15px;"></div>
            </div>

            <!-- Notes -->
            <div class="card fade-in">
                <h2><i class="fas fa-sticky-note"></i> Weak Topics / Notes</h2>
                <textarea class="notes-area" id="notesArea" placeholder="Physics: Electrostatics formulas weak...&#10;Math: Calculus practice needed..."></textarea>
                <button onclick="saveNotes()" style="width: 100%; margin-top: 10px;">
                    <i class="fas fa-save"></i> Save Notes
                </button>
            </div>
        </div>
    </div>

    <script>
        // Data
        const MOTIVATIONS = [
            "Neel 👑: Physics dies first. Math next. Chem crumbles. TOP 10 INCOMING!",
            "4:30 AM = Empire builders. 10:00 PM = Average. CHOOSE.",
            "8.5 hrs today = Real estate empire tomorrow.",
            "Fear isn't enemy. Complacency is. CRUSH IT.",
            "Weakest subject today = Strongest weapon tomorrow. ATTACK.",
            "CET Top 10 + Tech skills + Family business = UNSTOPPABLE.",
            "Streak unbroken = Empire building. One miss = Restart.",
            "Real estate king needs CET rank first. NO EXCUSES."
        ];

        let timeLeft = 25 * 60;
        let timerRunning = false;
        let timerInterval;

        // Initialize
        window.onload = function() {
            loadData();
            document.getElementById('dailyQuote').textContent = MOTIVATIONS[Math.floor(Math.random() * MOTIVATIONS.length)];
            updateTimerDisplay();
        };

        // Habits
        function toggleHabit(id) {
            const checkbox = document.getElementById(id);
            checkbox.checked = !checkbox.checked;
            checkbox.parentElement.classList.toggle('completed', checkbox.checked);
        }

        function saveAll() {
            const habits = ['morningBlock', 'mathBlock', 'chemBlock', 'nightBlock'];
            let completed = 0;
            habits.forEach(id => {
                localStorage.setItem(id, document.getElementById(id).checked);
                if (document.getElementById(id).checked) completed++;
            });

            const todayScore = completed;
            document.getElementById('todayScore').textContent = todayScore;
            localStorage.setItem('todayScore', todayScore);

            // Streak logic
            const lastDate = localStorage.getItem('lastDate');
            const today = new Date().toDateString();
            let streak = parseInt(localStorage.getItem('streak') || 0);
            
            if (lastDate === today) {
                // Same day, just update
            } else if (lastDate && new Date(today) - new Date(lastDate) === 86400000) {
                // Yesterday, continue streak
                streak++;
            } else {
                // Reset streak
                streak = completed === 4 ? 1 : 0;
            }
            
            localStorage.setItem('streak', streak);
            localStorage.setItem('lastDate', today);
            document.getElementById('streak').textContent = streak;
            document.getElementById('totalDays').textContent = parseInt(localStorage.getItem('totalDays') || 0) + 1;
            localStorage.setItem('totalDays', parseInt(localStorage.getItem('totalDays') || 0) + 1);

            // Celebration
            if (completed === 4) {
                setTimeout(() => alert('🏆 PERFECT DAY! Streak: ' + streak + ' 👑'), 100);
            }
            alert('Progress Saved! ' + completed + '/4 blocks complete 💪');
        }

        // Timer
        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startPomodoro() {
            timerRunning = true;
            document.getElementById('pauseBtn').disabled = false;
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert('🎉 25min COMPLETE! Take 5min break 👑');
                    timeLeft = 25 * 60;
                    updateTimerDisplay();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timeLeft = 25 * 60;
            updateTimerDisplay();
            document.getElementById('pauseBtn').disabled = true;
        }

        // Reminders
        function addReminder() {
            const input = document.getElementById('newReminder');
            const text = input.value.trim();
            if (text) {
                const reminders = JSON.parse(localStorage.getItem('reminders') || '[]');
                reminders.unshift(text);
                localStorage.setItem('reminders', JSON.stringify(reminders));
                input.value = '';
                renderReminders();
            }
        }

        function renderReminders() {
            const list = document.getElementById('remindersList');
            const reminders = JSON.parse(localStorage.getItem('reminders') || '[]');
            list.innerHTML = reminders.map((rem, i) => `
                <div class="reminder-item">
                    <span>${rem}</span>
                    <button class="delete-btn" onclick="deleteReminder(${i})">Done</button>
                </div>
            `).join('');
        }

        function deleteReminder(index) {
            const reminders = JSON.parse(localStorage.getItem('reminders') || '[]');
            reminders.splice(index, 1);
            localStorage.setItem('reminders', JSON.stringify(reminders));
            renderReminders();
        }

        // Notes
        function saveNotes() {
            localStorage.setItem('notes', document.getElementById('notesArea').value);
            alert('Notes Saved 📝');
        }

        // Load all data
        function loadData() {
            // Habits
            ['morningBlock', 'mathBlock', 'chemBlock', 'nightBlock'].forEach(id => {
                const checked = localStorage.getItem(id) === 'true';
                const checkbox = document.getElementById(id);
                checkbox.checked = checked;
                checkbox.parentElement.classList.toggle('completed', checked);
            });

            // Stats
            document.getElementById('streak').textContent = localStorage.getItem('streak') || 0;
            document.getElementById('todayScore').textContent = localStorage.getItem('todayScore') || 0;
            document.getElementById('totalDays').textContent = localStorage.getItem('totalDays') || 0;

            // Notes
            document.getElementById('notesArea').value = localStorage.getItem('notes') || '';

            // Reminders
            renderReminders();
        }

        // Enter key for reminders
        document.getElementById('newReminder').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addReminder();
        });
    </script>
</body>
</html>
