<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neel CET Command Center 👑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .chart-container {
            position: relative; height: 250px; width: 100%;
        }
        .floating-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .floating-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 35px 60px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen p-6">
    <div class="max-w-7xl mx-auto">

        <!-- Hero Header -->
        <div class="text-center mb-12 glass rounded-3xl p-12 floating-card">
            <div class="text-6xl mb-4">
                <i class="fas fa-crown text-yellow-400 pulse-animation"></i>
            </div>
            <h1 class="text-5xl md:text-7xl font-black gradient-text mb-6 tracking-tight">
                Neel CET
            </h1>
            <h1 class="text-5xl md:text-7xl font-black bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-teal-500 mb-8">
                Command Center
            </h1>
            <div id="masterQuote" class="text-xl md:text-2xl font-semibold opacity-90 italic max-w-2xl mx-auto"></div>
        </div>

        <!-- KPI Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 mb-10">
            <div class="glass rounded-2xl p-8 text-center floating-card">
                <div class="text-4xl mb-2" id="streakKPI">
                    <i class="fas fa-fire text-orange-400"></i>
                </div>
                <div class="text-3xl font-bold text-white" id="streakNum">0</div>
                <div class="text-sm opacity-75">Day Streak 🔥</div>
            </div>
            <div class="glass rounded-2xl p-8 text-center floating-card">
                <div class="text-4xl mb-2" id="scoreKPI">
                    <i class="fas fa-trophy text-yellow-400"></i>
                </div>
                <div class="text-3xl font-bold text-white" id="scoreNum">0</div>
                <div class="text-sm opacity-75">Today 4/4</div>
            </div>
            <div class="glass rounded-2xl p-8 text-center floating-card">
                <div class="text-4xl mb-2">
                    <i class="fas fa-calendar-day text-blue-300"></i>
                </div>
                <div class="text-3xl font-bold text-white" id="totalDaysNum">0</div>
                <div class="text-sm opacity-75">Total Days</div>
            </div>
            <div class="glass rounded-2xl p-8 text-center floating-card">
                <div class="text-4xl mb-2">
                    <i class="fas fa-bolt text-emerald-400"></i>
                </div>
                <div class="text-3xl font-bold text-white" id="physicsMastery">0%</div>
                <div class="text-sm opacity-75">Physics Mastery</div>
            </div>
        </div>

        <!-- Main Dashboard Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-4 gap-8">
            
            <!-- Study Blocks (Priority 1) -->
            <div class="lg:col-span-2 xl:col-span-2 glass rounded-3xl p-8 floating-card">
                <div class="flex items-center mb-8">
                    <div class="w-12 h-12 bg-gradient-to-r from-orange-500 to-red-500 rounded-2xl flex items-center justify-center mr-4">
                        <i class="fas fa-tasks text-2xl"></i>
                    </div>
                    <h2 class="text-3xl font-bold">Study Blocks</h2>
                </div>
                
                <div class="space-y-4">
                    <div class="habit-block p-6 rounded-2xl border-2 border-transparent hover:border-emerald-400 transition-all duration-300 group" data-block="physics">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <div class="w-5 h-5 rounded-full bg-gradient-to-r from-orange-500 to-red-500 mr-4 flex-shrink-0"></div>
                                <div>
                                    <div class="font-semibold text-lg">Physics Block</div>
                                    <div class="text-sm opacity-75">5:30-8:15 AM • 40 MCQs Target</div>
                                </div>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" id="physicsBlock">
                                <div class="w-12 h-6 bg-gray-400 peer-focus:outline-none rounded-full peer peer-checked:bg-emerald-500 transition-all"></div>
                                <div class="absolute w-4 h-4 bg-white rounded-full shadow top-1 left-1 transition-transform peer-checked:translate-x-6"></div>
                            </label>
                        </div>
                    </div>

                    <div class="habit-block p-6
